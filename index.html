<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güvenli Bağlantı Doğrulaması</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-sizing: border-box;
        }
        .icon {
            width: 72px;
            height: 72px;
            margin-bottom: 20px;
            fill: #10b981; /* Güven veren yeşil renk */
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #1f2937;
        }
        p {
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .status-box {
            background-color: #ecfdf5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid #a7f3d0;
        }
        .button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.25);
        }
        .button:hover {
            background-color: #2563eb;
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }
        .button:active {
            transform: translateY(1px);
            box-shadow: none;
        }
        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Kurumsal Kalkan İkonu -->
        <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
        </svg>

        <h1>Bağlantı Doğrulandı</h1>
        <p>İstenilen içeriğe yönlendiriliyorsunuz. Bağlantı kalitesi ve güvenliği altyapımız tarafından kontrol edilmiştir.</p>

        <!-- Sahte Güvenlik Taraması Kutusu -->
        <div class="status-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            Sistem taraması temiz: Risk bulunmadı
        </div>

        <!-- Adsterra Linkine Giden Tıklama Butonu -->
        <a href="https://www.effectivecpmnetwork.com/m1dxtn35g?key=31e1e315d5553b30194180074ceb8c1a" class="button">İçeriğe Devam Et</a>

        <div class="footer">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM8.9 6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2H8.9V6z"/></svg>
            256-Bit SSL ile korunmaktadır
        </div>
    </div>
</body>
</html>
