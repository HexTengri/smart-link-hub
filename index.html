<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>140+ IQ Görsel Algı Testi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background-color: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
        }
        h1 { font-size: 22px; color: #e94560; margin-bottom: 5px; }
        p.subtitle { font-size: 14px; color: #a2a2bd; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .box { background-color: #0f3460; height: 100px; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .box:hover { transform: scale(1.05); border: 2px solid #e94560; }
        
        .btn { background-color: #0f3460; color: white; border: 1px solid #e94560; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; width: 90%; max-width: 300px;}
        .btn-hint { background-color: #e94560; color: white; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        /* Reklam Alanları - Sayfa düzenini bozmaması için overflow ayarlandı */
        .ad-space-top { margin: 15px 0; min-height: 90px; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden;}
        .ad-space-bottom { margin: 15px 0; min-height: 50px; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden;}
    </style>
</head>
<body>

    <!-- ÜST BANNER: 728x90 -->
    <div class="ad-space-top">
        <script type="text/javascript">
            atOptions = {
                'key' : '3edec164d12ba0b4e0a48a50e5430175',
                'format' : 'iframe',
                'height' : 90,
                'width' : 728,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/3edec164d12ba0b4e0a48a50e5430175/invoke.js"></script>
    </div>

    <!-- OYUN ALANI -->
    <div class="container">
        <h1>Bölüm 1: Görsel Algı</h1>
        <p class="subtitle">Sadece 140 IQ ve üzeri insanlar farklı renkteki kutuyu 5 saniyede bulabilir.</p>
        
        <div class="grid" id="gameGrid"></div>
        <p id="message" style="color: #e94560; font-weight: bold; height: 20px;"></p>

        <!-- Etkileşim Butonları -->
        <button class="btn btn-hint" onclick="getHint()">💡 Yakınlaştır / İpucu Al</button>
        <button class="btn" onclick="nextLevel()">Sonraki Seviye ➡</button>
    </div>

    <!-- ALT BANNER: 320x50 -->
    <div class="ad-space-bottom">
        <script type="text/javascript">
            atOptions = {
                'key' : '7bc5d585e0f4e55874b2e6531f0181fe',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/7bc5d585e0f4e55874b2e6531f0181fe/invoke.js"></script>
    </div>

    <!-- POPUNDER KODU (Tıklamada arka planda sayfa açar) -->
    <script type='text/javascript' src='//pl29787483.effectivecpmnetwork.com/5e/33/f9/5e33f9ba33cda1aa3712d66915d8b932.js'></script>

    <!-- SOCIAL BAR KODU (Bildirim gibi çıkan reklam) -->
    <script type='text/javascript' src='//pl29787480.effectivecpmnetwork.com/5b/27/3b/5b273be5f78db5e0848111f4f116c6d8.js'></script>

    <!-- OYUNUN ZEKASI VE SMART LINK YÖNLENDİRMESİ -->
    <script>
        // Senin yeni Smart Link (Direct Link) Kodun
        const adLink = "https://www.effectivecpmnetwork.com/ajaki9gu4k?key=68c96ce65fa113a26bd7b58762d87986";
        let level = 1;

        function triggerAd() { 
            // Kullanıcı oyuna kapılıp tıkladıkça yeni sekmede reklam açar
            window.open(adLink, '_blank'); 
        }

        function initGame() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            document.getElementById('message').innerText = '';
            
            const baseColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
            const diffColor = `hsl(${Math.random() * 360}, 70%, ${50 + (10 / level)}%)`;
            const oddIndex = Math.floor(Math.random() * 9);
            
            for(let i=0; i<9; i++) {
                let box = document.createElement('div');
                box.className = 'box';
                box.style.backgroundColor = (i === oddIndex) ? diffColor : baseColor;
                
                box.onclick = function() {
                    if(i === oddIndex) {
                        document.getElementById('message').innerText = "Doğru! Ama bu kolaydı...";
                        triggerAd();
                    } else {
                        document.getElementById('message').innerText = "Yanlış kutu! Odaklan!";
                        triggerAd();
                    }
                };
                grid.appendChild(box);
            }
        }

        function getHint() {
            document.getElementById('message').innerText = "İpucu: Farklı renkteki kutuya odaklan!";
            triggerAd();
        }

        function nextLevel() {
            level++;
            document.querySelector('h1').innerText = `Bölüm ${level}: İleri Düzey Algı`;
            initGame();
            triggerAd();
        }

        window.onload = initGame;
    </script>
</body>
</html>
